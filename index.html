<html>
<head>
<title>random editor lol</title>
<style>
body { background: #333; color: #eee; }
textarea { width: 100%; height: 80vh; background: #222; color: #aaa; }
</style>
</head>
<body>
<textarea></textarea>
<span id='count'>0 Characters</span>

<script>
const ding = new Audio('820353_bryansaravia_typewriter-key-press-06.wav)
ding.load();
document.querySelector('textarea').addEventListener('keydown', function() {
  localStorage.setItem('myText', this.value);
  document.getElementById('count').textContent = this.value.length + ' Characters';
  ding.play();
});
window.onload = function() {
  document.querySelector('textarea').value = localStorage.getItem('myText') || '';
  document.getElementById('count').textContent = document.querySelector('textarea').value.length + ' Characters';
};
</script>

</body>
</html>
